name: Deploy Frontend a producción

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-produccion
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/carmenmaria/frontend
            echo "→ Trayendo últimos cambios de main..."
            git fetch --prune origin
            git reset --hard origin/main
            echo "→ Instalando dependencias..."
            npm ci
            echo "→ Compilando build de producción..."
            npm run build
            echo "→ Copiando archivos a /var/www/carmenmaria..."
            rm -rf /var/www/carmenmaria/* || true
            cp -r out/* /var/www/carmenmaria/
            echo "✅ Deploy frontend completado."
